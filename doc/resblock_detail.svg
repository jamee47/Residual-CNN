<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Residual block internal structure</title>
<desc>Detailed view of one residual block: input passes through Conv1D, BatchNorm, ReLU, Conv1D, BatchNorm, then is added to a skip connection (identity, or a 1x1 conv projection if channel dimensions change), followed by a final ReLU. The dashed line on the right shows the skip path bypassing the main convolutional path.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#2c2c2a}
.th{font-size:14px;font-weight:bold}
.ts{font-size:12px;fill:#5f5e5a}
.cont-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.box-teal{fill:#9FE1CB;stroke:#0F6E56;stroke-width:0.5}
.title-teal{fill:#04342C}
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.box-amber{fill:#FAC775;stroke:#854F0B;stroke-width:0.5}
.title-amber{fill:#412402}
.box-purple{fill:#CECBF6;stroke:#534AB7;stroke-width:0.5}
.title-purple{fill:#26215C}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.skip{stroke:#73726c;stroke-width:0.5;fill:none;stroke-dasharray:5 5}
</style>

<rect class="cont-teal" x="20" y="20" width="640" height="700" rx="20"/>
<text class="th title-teal" x="40" y="48">ResBlock i (input channels to filters[i])</text>

<rect class="box-gray" x="180" y="68" width="200" height="44" rx="8"/>
<text class="th" x="280" y="90" text-anchor="middle" dominant-baseline="central">Block input</text>
<line x1="280" y1="112" x2="280" y2="140" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-teal" x="180" y="150" width="200" height="44" rx="8"/>
<text class="th title-teal" x="280" y="172" text-anchor="middle" dominant-baseline="central">conv1: Conv1D k=3</text>
<line x1="280" y1="194" x2="280" y2="218" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-teal" x="180" y="228" width="200" height="44" rx="8"/>
<text class="th title-teal" x="280" y="250" text-anchor="middle" dominant-baseline="central">bn1: BatchNorm</text>
<line x1="280" y1="272" x2="280" y2="296" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-teal" x="180" y="306" width="200" height="44" rx="8"/>
<text class="th title-teal" x="280" y="328" text-anchor="middle" dominant-baseline="central">relu1: ReLU</text>
<line x1="280" y1="350" x2="280" y2="374" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-teal" x="180" y="384" width="200" height="44" rx="8"/>
<text class="th title-teal" x="280" y="406" text-anchor="middle" dominant-baseline="central">conv2: Conv1D k=3</text>
<line x1="280" y1="428" x2="280" y2="452" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-teal" x="180" y="462" width="200" height="44" rx="8"/>
<text class="th title-teal" x="280" y="484" text-anchor="middle" dominant-baseline="central">bn2: BatchNorm</text>
<line x1="280" y1="506" x2="280" y2="540" class="arr" marker-end="url(#arrow2)"/>

<path d="M380 90 L 540 90 L 540 562" class="skip"/>
<rect class="box-amber" x="450" y="290" width="180" height="56" rx="8"/>
<text class="th title-amber" x="540" y="310" text-anchor="middle" dominant-baseline="central">Identity skip</text>
<text class="ts" x="540" y="328" text-anchor="middle" dominant-baseline="central">or 1x1 conv if channels differ</text>

<rect class="box-purple" x="180" y="540" width="200" height="44" rx="8"/>
<text class="th title-purple" x="280" y="562" text-anchor="middle" dominant-baseline="central">Add</text>
<line x1="540" y1="562" x2="380" y2="562" class="skip" marker-end="url(#arrow2)"/>

<line x1="280" y1="584" x2="280" y2="608" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-purple" x="180" y="618" width="200" height="44" rx="8"/>
<text class="th title-purple" x="280" y="640" text-anchor="middle" dominant-baseline="central">relu2: ReLU</text>
<line x1="280" y1="662" x2="280" y2="686" class="arr" marker-end="url(#arrow2)"/>

<rect class="box-gray" x="180" y="696" width="200" height="40" rx="8"/>
<text class="th" x="280" y="716" text-anchor="middle" dominant-baseline="central">Block output</text>
</svg>

<svg width="100%" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Residual-CNN architecture overview</title>
<desc>Two-branch network. The pilot branch processes a padded pilot tensor through a stem convolution and four residual blocks with increasing dilation, then global average and max pooling. The side-info branch processes scalar features and a one-hot MODCOD encoding through two dense layers. Both branches are concatenated and passed through a dense fusion head to produce hk_real and hk_imag.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#2c2c2a}
.th{font-size:14px;font-weight:bold}
.ts{font-size:12px;fill:#5f5e5a}
.box{fill:#f1efe8;stroke:#888780;stroke-width:0.5;rx:8}
.cont-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.box-teal{fill:#9FE1CB;stroke:#0F6E56;stroke-width:0.5}
.title-teal{fill:#04342C}
.cont-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.box-coral{fill:#F5C4B3;stroke:#993C1D;stroke-width:0.5}
.title-coral{fill:#4A1B0C}
.cont-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.box-purple{fill:#CECBF6;stroke:#534AB7;stroke-width:0.5}
.title-purple{fill:#26215C}
.box-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>

<rect class="box-gray" x="40" y="20" width="270" height="56" rx="8"/>
<text class="th" x="175" y="40" text-anchor="middle" dominant-baseline="central">Pilots input</text>
<text class="ts" x="175" y="58" text-anchor="middle" dominant-baseline="central">[B, MAX_NP, 3] re / im / mask</text>

<rect class="box-gray" x="370" y="20" width="270" height="56" rx="8"/>
<text class="th" x="505" y="40" text-anchor="middle" dominant-baseline="central">Side-info input</text>
<text class="ts" x="505" y="58" text-anchor="middle" dominant-baseline="central">[B, n_side] Es/No, MODCOD one-hot</text>

<line x1="175" y1="76" x2="175" y2="108" class="arr" marker-end="url(#arrow)"/>
<line x1="505" y1="76" x2="505" y2="108" class="arr" marker-end="url(#arrow)"/>

<rect class="cont-teal" x="20" y="116" width="310" height="500" rx="20"/>
<text class="th title-teal" x="40" y="144">Pilot CNN-residual branch</text>

<rect class="box-teal" x="44" y="164" width="262" height="48" rx="8"/>
<text class="th title-teal" x="175" y="188" text-anchor="middle" dominant-baseline="central">Stem: Conv1D(64, k=7) + BN + ReLU</text>
<line x1="175" y1="212" x2="175" y2="236" class="arr" marker-end="url(#arrow)"/>

<rect class="box-teal" x="44" y="236" width="262" height="60" rx="8"/>
<text class="th title-teal" x="175" y="256" text-anchor="middle" dominant-baseline="central">ResBlock 1</text>
<text class="ts" x="175" y="276" text-anchor="middle" dominant-baseline="central">64 channels, dilation 1</text>
<line x1="175" y1="296" x2="175" y2="320" class="arr" marker-end="url(#arrow)"/>

<rect class="box-teal" x="44" y="320" width="262" height="60" rx="8"/>
<text class="th title-teal" x="175" y="340" text-anchor="middle" dominant-baseline="central">ResBlock 2</text>
<text class="ts" x="175" y="360" text-anchor="middle" dominant-baseline="central">64 channels, dilation 2</text>
<line x1="175" y1="380" x2="175" y2="404" class="arr" marker-end="url(#arrow)"/>

<rect class="box-teal" x="44" y="404" width="262" height="60" rx="8"/>
<text class="th title-teal" x="175" y="424" text-anchor="middle" dominant-baseline="central">ResBlock 3</text>
<text class="ts" x="175" y="444" text-anchor="middle" dominant-baseline="central">128 channels, dilation 4</text>
<line x1="175" y1="464" x2="175" y2="488" class="arr" marker-end="url(#arrow)"/>

<rect class="box-teal" x="44" y="488" width="262" height="60" rx="8"/>
<text class="th title-teal" x="175" y="508" text-anchor="middle" dominant-baseline="central">ResBlock 4</text>
<text class="ts" x="175" y="528" text-anchor="middle" dominant-baseline="central">128 channels, dilation 8</text>
<line x1="175" y1="548" x2="175" y2="572" class="arr" marker-end="url(#arrow)"/>

<rect class="box-teal" x="44" y="572" width="262" height="48" rx="8"/>
<text class="th title-teal" x="175" y="588" text-anchor="middle" dominant-baseline="central">Global avg + max pooling</text>
<text class="ts" x="175" y="606" text-anchor="middle" dominant-baseline="central">256-d pooled features</text>

<rect class="cont-coral" x="350" y="116" width="310" height="220" rx="20"/>
<text class="th title-coral" x="370" y="144">Side-info MLP branch</text>

<rect class="box-coral" x="374" y="164" width="262" height="56" rx="8"/>
<text class="th title-coral" x="505" y="184" text-anchor="middle" dominant-baseline="central">Dense(64) + BatchNorm</text>
<text class="ts" x="505" y="202" text-anchor="middle" dominant-baseline="central">ReLU activation</text>
<line x1="505" y1="220" x2="505" y2="244" class="arr" marker-end="url(#arrow)"/>

<rect class="box-coral" x="374" y="244" width="262" height="48" rx="8"/>
<text class="th title-coral" x="505" y="262" text-anchor="middle" dominant-baseline="central">Dense(32), ReLU</text>
<text class="ts" x="505" y="280" text-anchor="middle" dominant-baseline="central">32-d embedding</text>

<path d="M175 620 L175 660 L255 660" class="arr" marker-end="url(#arrow)"/>
<path d="M505 292 L505 660 L425 660" class="arr" marker-end="url(#arrow)"/>

<rect class="cont-purple" x="160" y="668" width="360" height="116" rx="20"/>
<text class="th title-purple" x="180" y="696">Fusion head</text>

<rect class="box-purple" x="180" y="716" width="150" height="48" rx="8"/>
<text class="th title-purple" x="255" y="734" text-anchor="middle" dominant-baseline="central">Concatenate</text>
<text class="ts" x="255" y="752" text-anchor="middle" dominant-baseline="central">288-d fused vector</text>
<line x1="330" y1="740" x2="354" y2="740" class="arr" marker-end="url(#arrow)"/>

<rect class="box-purple" x="354" y="716" width="150" height="48" rx="8"/>
<text class="th title-purple" x="429" y="734" text-anchor="middle" dominant-baseline="central">Dense 128 to 64</text>
<text class="ts" x="429" y="752" text-anchor="middle" dominant-baseline="central">ReLU + Dropout 0.2</text>

<line x1="429" y1="764" x2="429" y2="784" class="arr" marker-end="url(#arrow)"/>
</svg>
